<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job AI Automation - Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>
        <span class="header-logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M20.5 2h-17A1.5 1.5 0 002 3.5v17A1.5 1.5 0 003.5 22h17a1.5 1.5 0 001.5-1.5v-17A1.5 1.5 0 0020.5 2zM8 19H5v-9h3zM6.5 8.25A1.75 1.75 0 118.3 6.5a1.78 1.78 0 01-1.8 1.75zM19 19h-3v-4.74c0-1.42-.6-1.93-1.38-1.93A1.74 1.74 0 0013 14.19a.66.66 0 000 .14V19h-3v-9h2.9v1.3a3.11 3.11 0 012.7-1.4c1.55 0 3.36.86 3.36 3.66z"/>
          </svg>
        </span>
        <span class="header-title-text">Job AI Automation</span>
        <span style="opacity:.5;font-weight:400;margin:0 .15rem">/</span>
        Dashboard
      </h1>
      <nav class="links">
        <a href="/">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle;margin-right:3px"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
          Início
        </a>
      </nav>
    </div>
  </header>

  <div class="container">

    <!-- Card: Ações de análise -->
    <section class="card">
      <h2>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="color:#0a66c2;flex-shrink:0"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
        Análise de compatibilidade
      </h2>
      <button type="button" id="btnMatch">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>
        Analisar vagas (match com currículo)
      </button>
      <div id="matchProgress" class="progress-box" style="display:none;">
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="matchBar" style="width:0%"></div>
        </div>
        <p id="matchProgressText" class="status"></p>
      </div>
      <p id="matchStatus" class="status"></p>
    </section>

    <!-- Card: Vagas pendentes -->
    <section class="card">
      <h2>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="color:#0a66c2;flex-shrink:0"><path d="M20 6h-2.18c.07-.44.18-.88.18-1.33C18 2.1 15.9 0 13.33 0c-1.33 0-2.5.54-3.33 1.41L9 3 7.99 1.41C7.17.54 6 0 4.67 0 2.1 0 0 2.1 0 4.67c0 .45.11.89.18 1.33H0v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zM13.33 2c1.47 0 2.67 1.19 2.67 2.67 0 1.47-1.2 2.66-2.67 2.66L9.76 6.21C9.92 6.19 9.97 6 9.97 6l-.03-.12C9.35 3.8 11.07 2 13.33 2zM2 4.67C2 3.2 3.2 2 4.67 2c2.26 0 3.98 1.8 3.39 4.09l-.02.08c0 .01.04.16.01.16L4.69 7.34C3.2 7.34 2 6.14 2 4.67zM2 20V8h8v12H2zm18 0h-8V8h8v12z"/></svg>
        Vagas disponíveis
        <span id="jobsCount" class="count-badge"></span>
      </h2>

      <!-- Bulk actions bar (sticky) -->
      <div id="bulkActionsBar" class="bulk-actions-bar" style="display:none;">
        <span id="bulkSelectedCount"></span>
        <div class="bulk-actions-buttons">
          <button type="button" id="btnBulkMarkApplied" class="btn-apply">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
            Marcar como candidatado
          </button>
          <button type="button" id="btnBulkDelete" class="btn-delete">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
            Excluir selecionadas
          </button>
          <button type="button" id="btnClearSelection">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            Limpar seleção
          </button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th><input type="checkbox" id="selectAllJobs" title="Selecionar todos"></th>
              <th>Título</th>
              <th>Empresa</th>
              <th>Score</th>
              <th>Status</th>
              <th>Justificativa</th>
              <th>Ações</th>
              <th>Detalhes</th>
            </tr>
          </thead>
          <tbody id="jobsTable">
          </tbody>
        </table>
      </div>
      <p id="actionStatus" class="status"></p>
    </section>

    <!-- Card: Vagas candidatadas -->
    <section class="card">
      <h2>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="color:#2e7d32;flex-shrink:0"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        Vagas que já me candidatei
        <span id="appliedJobsCount" class="count-badge"></span>
      </h2>

      <!-- Bulk actions bar applied (sticky) -->
      <div id="bulkActionsBarApplied" class="bulk-actions-bar" style="display:none;">
        <span id="bulkSelectedCountApplied"></span>
        <div class="bulk-actions-buttons">
          <button type="button" id="btnBulkUnmark" class="btn-unapply">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M19 11H7.83l4.88-4.88c.39-.39.39-1.03 0-1.42-.39-.39-1.02-.39-1.41 0l-6.59 6.59c-.39.39-.39 1.02 0 1.41l6.59 6.59c.39.39 1.02.39 1.41 0 .39-.39.39-1.02 0-1.41L7.83 13H19c.55 0 1-.45 1-1s-.45-1-1-1z"/></svg>
            Mover para pendentes
          </button>
          <button type="button" id="btnBulkDeleteApplied" class="btn-delete">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
            Excluir selecionadas
          </button>
          <button type="button" id="btnClearSelectionApplied">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            Limpar seleção
          </button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th><input type="checkbox" id="selectAllApplied" title="Selecionar todos"></th>
              <th>Título</th>
              <th>Empresa</th>
              <th>Score</th>
              <th>Status</th>
              <th>Data da candidatura</th>
              <th>Ações</th>
              <th>Detalhes</th>
            </tr>
          </thead>
          <tbody id="appliedJobsTable">
          </tbody>
        </table>
      </div>
    </section>

  </div>

  <!-- Modal de detalhes da vaga -->
  <div class="modal-overlay" id="jobModal">
    <div class="modal">
      <button class="modal-close" id="modalClose" title="Fechar">&times;</button>
      <h2 id="modalTitle"></h2>
      <div class="modal-meta">
        <span id="modalCompany"></span>
        <span class="modal-score" id="modalScore"></span>
        <span class="modal-status" id="modalStatusBadge"></span>
      </div>
      <div class="modal-section">
        <h3>Descrição da vaga</h3>
        <div id="modalDescription" class="modal-description"></div>
      </div>
      <div class="modal-section">
        <h3>Justificativa da IA</h3>
        <p id="modalJustificativa" style="font-size:.875rem;color:#374151;margin:0;line-height:1.65;"></p>
      </div>
      <div class="modal-section modal-footer-info">
        <span id="modalAppliedInfo"></span>
        <div class="action-buttons modal-actions">
          <button type="button" class="btn-apply" id="modalApplyBtn">Já me candidatei</button>
          <button type="button" class="btn-delete" id="modalDeleteBtn">Excluir</button>
          <a id="modalLink" href="#" target="_blank" rel="noopener">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M19 19H5V5h7V3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>
            Abrir no LinkedIn
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal genérica de confirmação -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-modal">
      <div class="confirm-icon" id="confirmIcon"></div>
      <h3 id="confirmTitle"></h3>
      <p id="confirmMsg"></p>
      <div class="confirm-actions">
        <button type="button" class="confirm-cancel" id="confirmCancelBtn">Cancelar</button>
        <button type="button" class="confirm-ok" id="confirmOkBtn"></button>
      </div>
    </div>
  </div>

  <script src="/js/scraperBanner.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
