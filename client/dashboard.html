<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job AI Automation - Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Dashboard - Compatibilidade de Vagas</h1>
      <nav class="links">
        <a href="/">Voltar ao início</a>
      </nav>
    </header>

    <section class="card">
      <h2>Ações em lote</h2>
      <button type="button" id="btnMatch">Analisar vagas (match com currículo)</button>
      <div id="matchProgress" class="progress-box" style="display:none;">
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="matchBar" style="width:0%"></div>
        </div>
        <p id="matchProgressText" class="status"></p>
      </div>
      <p id="matchStatus" class="status"></p>
    </section>

    <section class="card">
      <h2>Vagas disponíveis</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Título</th>
              <th>Empresa</th>
              <th>Score</th>
              <th>Status</th>
              <th>Justificativa</th>
              <th>Ações</th>
              <th>Detalhes</th>
            </tr>
          </thead>
          <tbody id="jobsTable">
          </tbody>
        </table>
      </div>
      <p id="actionStatus" class="status"></p>
    </section>

    <section class="card">
      <h2>Vagas que já me candidatei</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Título</th>
              <th>Empresa</th>
              <th>Score</th>
              <th>Status</th>
              <th>Data da candidatura</th>
              <th>Ações</th>
              <th>Detalhes</th>
            </tr>
          </thead>
          <tbody id="appliedJobsTable">
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <!-- Modal de detalhes da vaga -->
  <div class="modal-overlay" id="jobModal">
    <div class="modal">
      <button class="modal-close" id="modalClose">&times;</button>
      <h2 id="modalTitle"></h2>
      <div class="modal-meta">
        <span id="modalCompany"></span>
        <span class="modal-score" id="modalScore"></span>
        <span class="modal-status" id="modalStatusBadge"></span>
      </div>
      <div class="modal-section">
        <h3>Descrição da vaga</h3>
        <div id="modalDescription" class="modal-description"></div>
      </div>
      <div class="modal-section">
        <h3>Justificativa da IA</h3>
        <p id="modalJustificativa"></p>
      </div>
      <div class="modal-section modal-footer-info">
        <span id="modalAppliedInfo"></span>
        <a id="modalLink" href="#" target="_blank" rel="noopener">Abrir no LinkedIn</a>
      </div>
    </div>
  </div>

  <script src="/js/dashboard.js"></script>
</body>
</html>
